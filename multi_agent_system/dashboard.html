<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAOS Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080c12;
      --surface:     #0d1117;
      --surface2:    #161b22;
      --surface3:    #1c2330;
      --border:      #21262d;
      --accent:      #58a6ff;
      --accent2:     #3fb950;
      --warn:        #d29922;
      --error:       #f85149;
      --purple:      #bc8cff;
      --cyan:        #39d0d8;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --radius:      8px;
      --font:        'Inter', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    /* ---------- Layout ---------- */
    .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; overflow: hidden; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    header .logo span { color: var(--accent); }
    header .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 12px; color: var(--text-muted);
    }
    header .status-pill .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
      transition: background .3s;
    }
    header .status-pill.connected .dot { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
    header .status-pill.error .dot { background: var(--error); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    header .ml-auto { margin-left: auto; display: flex; gap: 8px; }
    header button {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all .2s;
    }
    header button:hover { border-color: var(--accent); color: var(--accent); }

    .columns { display: grid; grid-template-columns: 280px 1fr 320px; gap: 0; height: 100%; overflow: hidden; }

    /* ---------- Panels ---------- */
    .panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel:last-child { border-right: none; }
    .panel-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
    }
    .panel-header h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
    .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ---------- Agent Cards ---------- */
    .agent-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; margin-bottom: 8px; background: var(--surface2);
      transition: border-color .25s, box-shadow .25s;
    }
    .agent-card.thinking { border-color: var(--cyan); box-shadow: 0 0 12px rgba(57,208,216,.15); }
    .agent-card.done    { border-color: var(--accent2); }
    .agent-card .agent-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .agent-card .agent-status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: var(--surface3); color: var(--text-muted);
    }
    .agent-card.thinking .agent-status { background: rgba(57,208,216,.15); color: var(--cyan); }
    .agent-card.done    .agent-status { background: rgba(63,185,80,.15); color: var(--accent2); }
    .agent-card .agent-task { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }
    .agent-card .agent-model { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); }

    /* ---------- Main Feed ---------- */
    #feed { display: flex; flex-direction: column; gap: 6px; }

    .event-item {
      border-radius: var(--radius); padding: 10px 14px;
      background: var(--surface2); border-left: 3px solid var(--border);
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

    .event-item.task_start  { border-left-color: var(--accent); }
    .event-item.react_step  { border-left-color: var(--purple); }
    .event-item.agent_status{ border-left-color: var(--cyan); }
    .event-item.tool_call   { border-left-color: var(--warn); }
    .event-item.tool_result { border-left-color: var(--accent2); }
    .event-item.tool_result.fail { border-left-color: var(--error); }
    .event-item.log         { border-left-color: var(--border); }

    .event-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
    .event-type {
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
      padding: 1px 6px; border-radius: 10px; background: var(--surface3);
    }
    .event-item.task_start  .event-type { color: var(--accent); }
    .event-item.react_step  .event-type { color: var(--purple); }
    .event-item.agent_status .event-type { color: var(--cyan); }
    .event-item.tool_call   .event-type { color: var(--warn); }
    .event-item.tool_result .event-type { color: var(--accent2); }
    .event-item.tool_result.fail .event-type { color: var(--error); }

    .event-ts { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }
    .event-agent { font-size: 11px; font-weight: 600; color: var(--accent2); }
    .event-body { font-size: 12px; color: var(--text); line-height: 1.5; }
    .event-body .tool-name { font-family: var(--mono); color: var(--warn); }
    .event-body .args {
      margin-top: 4px; padding: 6px 8px; border-radius: 4px;
      background: var(--surface3); font-family: var(--mono); font-size: 11px; color: var(--text-muted);
      white-space: pre-wrap; word-break: break-all; max-height: 80px; overflow-y: auto;
    }
    .elapsed { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-left: auto; }

    /* ---------- Stats Panel ---------- */
    .stat-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; margin-bottom: 8px; background: var(--surface2);
    }
    .stat-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
    .stat-card .sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: var(--mono); }

    .task-box {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; margin-bottom: 8px; background: var(--surface2);
    }
    .task-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .task-box .task-text { font-size: 13px; color: var(--text); line-height: 1.5; }
    .task-box .step-badge {
      display: inline-block; margin-top: 6px;
      padding: 2px 8px; border-radius: 10px; background: rgba(188,140,255,.15);
      color: var(--purple); font-size: 11px; font-family: var(--mono);
    }

    /* ---------- Tool Timeline ---------- */
    .tool-timeline { margin-top: 8px; }
    .timeline-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
      border-bottom: 1px solid var(--surface3); font-size: 11px;
    }
    .timeline-item:last-child { border-bottom: none; }
    .tl-icon { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; margin-top: 2px; }
    .tl-icon.ok   { background: rgba(63,185,80,.2); color: var(--accent2); }
    .tl-icon.fail { background: rgba(248,81,73,.2);  color: var(--error); }
    .tl-tool { font-family: var(--mono); color: var(--warn); flex: 1; }
    .tl-agent { color: var(--text-muted); }
    .tl-ms { color: var(--text-muted); font-family: var(--mono); }

    /* ---------- Misc ---------- */
    .empty { color: var(--text-muted); font-size: 12px; text-align: center; padding: 24px; }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .badge.step { background: rgba(188,140,255,.15); color: var(--purple); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">MAO<span>S</span> Dashboard</div>
    <div class="status-pill" id="connStatus">
      <div class="dot"></div>
      <span id="connLabel">Connecting…</span>
    </div>
    <div class="ml-auto">
      <button id="btnClear">Clear Feed</button>
      <button id="btnPause">Pause</button>
    </div>
  </header>

  <div class="columns">

    <!-- LEFT: Agent roster -->
    <div class="panel">
      <div class="panel-header">
        <h3>Agents</h3>
        <span id="agentCount" style="font-size:11px;color:var(--text-muted)">0 active</span>
      </div>
      <div class="panel-body" id="agentList">
        <div class="empty">No agents yet</div>
      </div>
    </div>

    <!-- MIDDLE: Event feed -->
    <div class="panel" style="border-right: 1px solid var(--border)">
      <div class="panel-header">
        <h3>Live Event Feed</h3>
        <span id="eventCount" style="font-size:11px;color:var(--text-muted)">0 events</span>
      </div>
      <div class="panel-body" id="feed">
        <div class="empty" id="feedEmpty">Waiting for events…</div>
      </div>
    </div>

    <!-- RIGHT: Stats & Task context -->
    <div class="panel">
      <div class="panel-header"><h3>Session Stats</h3></div>
      <div class="panel-body">
        <!-- Current task -->
        <div class="task-box" id="taskBox">
          <div class="label">Current Task</div>
          <div class="task-text" id="taskText">—</div>
          <span class="step-badge" id="stepBadge" style="display:none"></span>
        </div>

        <!-- Counter cards -->
        <div class="stat-card">
          <div class="label">Events Received</div>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Tool Calls</div>
          <div class="value" id="statTools">0</div>
          <div class="sub" id="statToolSuccess">0 success / 0 fail</div>
        </div>
        <div class="stat-card">
          <div class="label">ReAct Steps</div>
          <div class="value" id="statSteps">0</div>
        </div>

        <!-- Recent tool timeline -->
        <div class="panel-header" style="margin: 8px -12px 0; padding: 10px 16px; border-top: 1px solid var(--border);">
          <h3>Recent Tool Calls</h3>
        </div>
        <div class="tool-timeline" id="toolTimeline">
          <div class="empty">No tool calls yet</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const WS_URL   = `ws://${location.hostname}:8000/ws/dashboard`;
const MAX_FEED  = 200;
const MAX_TOOLS = 20;

// ─── State ───────────────────────────────────────────────────────────────────
let paused   = false;
let evTotal  = 0, toolSucc = 0, toolFail = 0, steps = 0;
const agents = {};       // agent_id → {name, status, task, model}
const toolLog = [];      // recent tool calls

// ─── DOM refs ────────────────────────────────────────────────────────────────
const $pill       = document.getElementById('connStatus');
const $label      = document.getElementById('connLabel');
const $feed       = document.getElementById('feed');
const $feedEmpty  = document.getElementById('feedEmpty');
const $agentList  = document.getElementById('agentList');
const $agentCount = document.getElementById('agentCount');
const $eventCount = document.getElementById('eventCount');
const $taskText   = document.getElementById('taskText');
const $stepBadge  = document.getElementById('stepBadge');
const $statTotal  = document.getElementById('statTotal');
const $statTools  = document.getElementById('statTools');
const $statToolSub = document.getElementById('statToolSuccess');
const $statSteps  = document.getElementById('statSteps');
const $tl         = document.getElementById('toolTimeline');

document.getElementById('btnClear').onclick = () => {
  $feed.innerHTML = '';
  $feedEmpty.style.display = 'block';
  $feed.appendChild($feedEmpty);
  evTotal = 0; toolSucc = 0; toolFail = 0; steps = 0;
  updateStats();
};
document.getElementById('btnPause').onclick = function() {
  paused = !paused;
  this.textContent = paused ? 'Resume' : 'Pause';
  this.style.color = paused ? 'var(--warn)' : '';
};

// ─── WebSocket ───────────────────────────────────────────────────────────────
let ws, retryTimer, retryDelay = 1000;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setPill('connected', 'Connected');
    retryDelay = 1000;
    clearTimeout(retryTimer);
  };

  ws.onclose = (e) => {
    setPill('error', `Disconnected (${e.code})`);
    retryTimer = setTimeout(() => { retryDelay = Math.min(retryDelay * 1.5, 15000); connect(); }, retryDelay);
  };

  ws.onerror = () => setPill('error', 'Error');

  ws.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      handleEvent(ev);
    } catch(_) {}
  };
}

connect();

// ─── Event dispatch ──────────────────────────────────────────────────────────
function handleEvent(ev) {
  evTotal++;
  updateStats();

  switch (ev.type) {
    case 'snapshot':
      (ev.agents || []).forEach(a => updateAgent(a.agent, a.status, a.task, a.model));
      (ev.events || []).forEach(e2 => handleEvent(e2));
      return;

    case 'task_start':
      $taskText.textContent = ev.goal || '—';
      $stepBadge.style.display = 'none';
      if (!paused) insertEvent(ev, `<b>New Session:</b> ${esc(ev.goal)}`);
      break;

    case 'react_step':
      steps++;
      $statSteps.textContent = steps;
      $stepBadge.style.display = 'inline-block';
      $stepBadge.textContent = `Step ${ev.step}`;
      if (!paused) insertEvent(ev, `<b>ReAct Step ${ev.step}</b> — ${esc(ev.task_count || '?')} tasks remaining`);
      break;

    case 'agent_status':
      updateAgent(ev.agent, ev.status, ev.task, ev.model);
      if (!paused) {
        const icon = ev.status === 'thinking' ? '🤔' : '✅';
        const extra = ev.model ? ` <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">${esc(ev.model)}</span>` : '';
        insertEvent(ev, `${icon} <b>${esc(ev.agent)}</b> → ${esc(ev.status)}${extra}${ev.task ? '<br><span style="color:var(--text-muted)">'+esc(ev.task)+'</span>' : ''}`);
      }
      break;

    case 'tool_call':
      if (!paused) {
        const argsStr = ev.args && Object.keys(ev.args).length
          ? JSON.stringify(ev.args, null, 2)
          : null;
        insertEvent(ev,
          `🔧 <span class="tool-name">${esc(ev.tool)}</span> called by <b>${esc(ev.agent)}</b>` +
          (argsStr ? `<div class="args">${esc(argsStr)}</div>` : '')
        );
      }
      break;

    case 'tool_result': {
      toolLog.unshift(ev);
      if (toolLog.length > MAX_TOOLS) toolLog.pop();
      ev.success ? toolSucc++ : toolFail++;
      updateToolTimeline();
      if (!paused) {
        const ok = ev.success;
        const ms = ev.elapsed_ms != null ? `<span class="elapsed">${ev.elapsed_ms}ms</span>` : '';
        insertEvent(ev,
          `${ok ? '✅' : '❌'} <span class="tool-name">${esc(ev.tool)}</span> ${ok ? 'succeeded' : 'failed'} ${ms}` +
          (ev.error ? `<br><span style="color:var(--error)">${esc(ev.error)}</span>` : '')
        , !ok);
      }
      break;
    }

    case 'log':
      if (!paused) insertEvent(ev, `<span style="color:var(--text-muted)">${esc(ev.message || '')}</span>`);
      break;

    default:
      if (!paused) insertEvent(ev, `<span style="color:var(--text-muted)">${esc(JSON.stringify(ev))}</span>`);
  }
}

// ─── DOM helpers ─────────────────────────────────────────────────────────────
function insertEvent(ev, html, isFail = false) {
  if ($feedEmpty.parentNode === $feed) $feed.removeChild($feedEmpty);

  const div = document.createElement('div');
  div.className = `event-item ${ev.type || ''}${isFail ? ' fail' : ''}`;
  div.innerHTML = `
    <div class="event-meta">
      <span class="event-type">${esc(ev.type || 'event')}</span>
      ${ev.agent ? `<span class="event-agent">${esc(ev.agent)}</span>` : ''}
      <span class="event-ts">${ev.ts || now()}</span>
    </div>
    <div class="event-body">${html}</div>`;

  $feed.insertBefore(div, $feed.firstChild);

  // Prune
  while ($feed.children.length > MAX_FEED) $feed.removeChild($feed.lastChild);

  $eventCount.textContent = `${$feed.children.length} events`;
}

function updateAgent(agentId, status, task, model) {
  if (!agentId) return;
  agents[agentId] = { status, task: task || agents[agentId]?.task, model: model || agents[agentId]?.model };
  renderAgents();
}

function renderAgents() {
  const active = Object.entries(agents);
  if (!active.length) { $agentList.innerHTML = '<div class="empty">No agents yet</div>'; return; }

  $agentList.innerHTML = active.map(([id, a]) => `
    <div class="agent-card ${a.status || ''}">
      <div class="agent-name">${esc(id)}</div>
      <span class="agent-status">
        ${a.status === 'thinking' ? '⏳' : a.status === 'done' ? '✅' : '●'}
        ${esc(a.status || 'idle')}
      </span>
      ${a.task ? `<div class="agent-task">${esc(a.task)}</div>` : ''}
      ${a.model ? `<div class="agent-model">${esc(a.model)}</div>` : ''}
    </div>`).join('');

  const thinking = active.filter(([,a]) => a.status === 'thinking').length;
  $agentCount.textContent = `${thinking} thinking / ${active.length} total`;
}

function updateToolTimeline() {
  if (!toolLog.length) return;
  $tl.innerHTML = toolLog.slice(0, 12).map(t => `
    <div class="timeline-item">
      <div class="tl-icon ${t.success ? 'ok' : 'fail'}">${t.success ? '✓' : '✗'}</div>
      <div>
        <div class="tl-tool">${esc(t.tool)}</div>
        <div class="tl-agent">${esc(t.agent)}</div>
      </div>
      ${t.elapsed_ms != null ? `<div class="tl-ms">${t.elapsed_ms}ms</div>` : ''}
    </div>`).join('');
}

function updateStats() {
  $statTotal.textContent = evTotal;
  $statTools.textContent = toolSucc + toolFail;
  $statToolSub.textContent = `${toolSucc} success / ${toolFail} fail`;
}

function setPill(cls, text) {
  $pill.className = `status-pill ${cls}`;
  $label.textContent = text;
}

function now() {
  return new Date().toLocaleTimeString('en-US', { hour12: false });
}

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
